name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: 0.1.3，不需要加 v)'
        required: true
        type: string
        default: '0.1.3'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  build-and-release:
    name: Build & Release Executables
    needs: test
    # 当推送 v 开头的 tag、或发布 Release、或手动触发时执行
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 授权 action 对 Release 页面进行写入
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Inject version from tag or input into package.json
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          # 去除可能误填的 v 前缀
          VERSION=${VERSION#v}
          echo "TARGET_VERSION=$VERSION" >> $GITHUB_ENV
          npm version $VERSION --allow-same-version --no-git-tag-version || true
          echo "Injected version: $VERSION"

      - name: Build executables with pkg
        run: npm run build

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TARGET_VERSION }}
          name: Release v${{ env.TARGET_VERSION }}
          # 将 dist 目录下生成的所有二进制文件作为附件上传
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
