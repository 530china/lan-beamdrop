name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: 1.0.0)'
        required: true
        type: string
        default: 'test-build'
      publish:
        description: '是否正式发布到 Releases 页面？(取消勾选则仅打包上传临时附件)'
        required: true
        type: boolean
        default: false

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  build-and-release:
    name: Build & Package (Routine & Release)
    needs: test
    # 现在这个 job 将无条件运行（每个 PR 和 Push 都会测试打包）
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Determine Version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            # 普通推送时提取本地 package.json 版本号作为占位
            VERSION=$(node -p "require('./package.json').version")
          fi
          
          # 去除可能误填的 v 前缀
          VERSION=${VERSION#v}
          echo "TARGET_VERSION=$VERSION" >> $GITHUB_ENV
          npm version $VERSION --allow-same-version --no-git-tag-version || true
          echo "Building version: $VERSION"

      - name: Build executables with esbuild and pkg
        run: npm run build

      - name: Smoke test Linux executable
        run: |
          echo "Starting Linux executable in the background..."
          chmod +x ./dist/lan-beamdrop-linux
          ./dist/lan-beamdrop-linux &
          PID=$!
          echo "Process started with PID $PID. Waiting for 3 seconds..."
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "✅ Smoke test passed: Executable is running successfully."
            kill $PID || true
          else
            echo "❌ Smoke test failed: Executable crashed silently."
            exit 1
          fi

      - name: Upload Artifacts (For routine PRs and Dry Runs)
        # 只要不是打 Tag，且没有勾选正式发布的，都把产物作为临时附件供下载测试
        if: startsWith(github.ref, 'refs/tags/v') == false && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: lan-beamdrop-builds
          path: dist/lan-beamdrop-*
          retention-days: 7

      - name: Publish to GitHub Releases
        # 只有真正打 Tag，或者勾选了正式发布的手动触发，才会执行发布
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TARGET_VERSION }}
          name: Release v${{ env.TARGET_VERSION }}
          # 将 dist 目录下生成的所有二进制文件作为附件上传
          files: dist/lan-beamdrop-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
