name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  build-and-release:
    name: Build & Release Executables
    needs: test
    # 只有当推送的是以 v 开头的 tag（如 v1.0.0）时，才触发打包发布
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # 授权 action 对 Release 页面进行写入
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Inject version from tag into package.json
        run: |
          # 提取 tag 名字并去掉前面的 v（例如 v0.1.2 -> 0.1.2）
          VERSION=${GITHUB_REF_NAME#v}
          # 强制修改 package.json 中的 version 字段，但不生成 git commit
          npm version $VERSION --no-git-tag-version
          echo "Injected version: $VERSION"

      - name: Build executables with pkg
        run: npm run build

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # 将 dist 目录下生成的所有二进制文件作为附件上传
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
